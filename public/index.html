<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国用户特征检测 · China Access Check</title>
  <meta name="description" content="检测你的浏览环境是否会被 ChatGPT、Claude、LinkedIn 等网站识别为中国大陆用户">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header>
      <div class="header-row">
        <h1>🐾 中国用户特征检测</h1>
        <a id="github-link" href="https://github.com/palemoky/cn-check" target="_blank" rel="noopener" aria-label="GitHub 仓库">
          <svg height="24" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" fill="currentColor"/></svg>
        </a>
      </div>
      <p class="subtitle">
        越来越多的网站（ChatGPT、Claude、LinkedIn…）会通过多种信号识别并屏蔽中国大陆用户。
        本页在你的浏览器里复现这些检测手段，并给出综合评分。
      </p>
    </header>

    <section id="score">
      <div class="score-main">
        <div class="score-circle">
          <span id="score-num">…</span>
          <span class="score-total">/ 100</span>
        </div>
        <div class="score-right">
          <div class="score-text">
            <div id="score-verdict">准备检测…</div>
            <div class="score-bar"><div id="score-bar-fill"></div></div>
          </div>
          <div class="score-actions">
            <button id="toggle-secret" type="button" aria-pressed="false" title="一键隐藏 IP 等敏感信息，方便截图分享">
              <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              <span class="toggle-secret-label">隐藏敏感信息</span>
            </button>
            <button id="rerun">重新检测</button>
          </div>
        </div>
      </div>
      <div id="analysis" hidden></div>
      <div id="flags" hidden></div>
    </section>

    <section id="checks" class="grid"></section>

    <footer>
      <p>
        所有检测均在你的浏览器本地与本站服务端之间完成，不会记录或上传任何数据。<br/>
        评分仅供参考：各网站实际使用的信号与权重不同，且广告拦截插件、公司防火墙等也可能影响结果。
      </p>
    </footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
